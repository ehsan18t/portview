# PortLens - Release Pipeline
# Manually triggered workflow that builds release binaries for supported platforms,
# packages them as .tar.gz / .exe / .deb / .rpm, and creates a draft release.
# Asset names use the normalized version number without a leading `v` so they
# stay consistent with README examples and the updater's preferred lookup.
#
# Trigger: Actions tab > Release > Run workflow > enter version tag (e.g. v0.1.0)

name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            asset_suffix: x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: exe
            asset_suffix: x86_64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # 1.94.1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Derive asset tag
        id: asset-tag
        shell: bash
        run: |
          asset_tag="${{ inputs.tag }}"
          asset_tag="${asset_tag#v}"
          asset_tag="${asset_tag#V}"
          echo "value=$asset_tag" >> "$GITHUB_OUTPUT"

      # Build release binary
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Package as tar.gz (Linux)
      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/portlens staging/
          cp README.md LICENSE staging/
          cd staging
          tar czf ../portlens-${{ steps.asset-tag.outputs.value }}-${{ matrix.asset_suffix }}.tar.gz *

      # Upload the raw executable (Windows)
      - name: Package exe
        if: matrix.archive == 'exe'
        shell: pwsh
        run: |
          Copy-Item target/${{ matrix.target }}/release/portlens.exe portlens-${{ steps.asset-tag.outputs.value }}-${{ matrix.asset_suffix }}.exe

      # Build .deb package (Linux x86_64 only)
      - name: Build .deb package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb ./portlens-${{ steps.asset-tag.outputs.value }}-amd64.deb

      # Build .rpm package (Linux x86_64 only)
      - name: Build .rpm package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-generate-rpm --locked
          cargo generate-rpm --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/generate-rpm/*.rpm ./portlens-${{ steps.asset-tag.outputs.value }}-x86_64.rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-${{ matrix.target }}
          path: |
            portlens-${{ steps.asset-tag.outputs.value }}-*
          if-no-files-found: error

  release:
    name: Create Draft Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/

      - name: List release assets
        run: ls -lhR dist/

      - name: Create draft release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ inputs.tag }}
          name: PortLens ${{ inputs.tag }}
          draft: true
          generate_release_notes: true
          files: dist/*
