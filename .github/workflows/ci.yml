# PortLens - CI Pipeline
# Enforces code quality on pull requests. All checks must pass before merging.
#
# Gates (ALL must pass):
#   1. cargo fmt --check            → consistent formatting
#   2. cargo clippy (deny)          → zero lint warnings (all+pedantic+nursery)
#   3. cargo test --locked          → all tests pass, Cargo.lock respected
#   4. cargo bench --no-run         → benchmarks compile without errors
#   5. cargo build                  → debug binary compiles
#   6. cargo doc                    → documentation + doc-comment format valid
#   7. cargo deny check             → no vulnerable/banned dependencies
#
# Advisory (non-blocking):
#   - Benchmark regression vs PR merge-base (Criterion, 10% noise threshold)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Principle of least privilege — CI only reads source, never pushes.
permissions:
  contents: read

# Cancel any in-progress run for the same PR branch to avoid wasted minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  quality-gate:
    name: Quality Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # 1.94.1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true

      # Gate 1: Formatting — rejects inconsistent style
      - name: "Gate 1: cargo fmt --check"
        run: cargo fmt --all -- --check

      # Gate 2: Clippy (all+pedantic+nursery at deny level) — rejects lint violations.
      # Lint levels and per-lint overrides are configured in Cargo.toml [lints.clippy].
      - name: "Gate 2: cargo clippy"
        run: cargo clippy --locked --all-targets -- -D warnings

      # Gate 3: Tests — rejects broken logic; --locked ensures Cargo.lock is honoured
      - name: "Gate 3: cargo test"
        run: cargo test --locked --all-targets

      # Gate 4: Benchmarks — rejects benchmarks that do not compile
      - name: "Gate 4: cargo bench --no-run"
        run: cargo bench --locked --no-run

      # Gate 5: Debug build — rejects code that does not compile
      - name: "Gate 5: cargo build"
        run: cargo build --locked

      # Upload the debug binary for inspection / smoke-testing.
      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: portlens-${{ matrix.os }}-${{ github.sha }}
          path: |
            target/debug/portlens
            target/debug/portlens.exe
          retention-days: 7
          if-no-files-found: warn

      # Gate 6: Documentation & doc-comment format — rejects broken links, bare URLs,
      # invalid code blocks, and missing crate-level docs.
      - name: "Gate 6: cargo doc"
        run: cargo doc --locked --no-deps
        env:
          RUSTDOCFLAGS: >-
            -D warnings
            -D rustdoc::bare_urls
            -D rustdoc::invalid_rust_codeblocks
            -D rustdoc::private_intra_doc_links
            -D rustdoc::unescaped_backticks

  # Advisory gate: Benchmark regression detection.
  #
  # Runs the merge-base benchmarks once to establish a Criterion baseline, then
  # runs a baseline-compatible subset on the PR head for relative comparison.
  # The full PR-head suite is then executed separately so new benchmark names
  # still produce reports and can be checked against coarse absolute budgets.
  # Linux-only because Windows GitHub runners are too noisy for useful bench
  # comparison. PR-only because pushes to `main` have no baseline to diff against.
  #
  # `continue-on-error: true` keeps this advisory: a regression surfaces as a
  # warning annotation on the PR rather than blocking the merge, matching the
  # audit job's philosophy that noisy signals should not gate unrelated work.
  # Tighten to blocking once the noise floor on the shared runner is observed.
  bench-regression:
    name: Benchmark Regression (advisory)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # 1.94.1
        with:
          toolchain: stable

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          key: bench

      - name: Resolve merge-base
        id: base
        run: |
          base=$(git merge-base HEAD origin/${{ github.base_ref }})
          echo "sha=$base" >> "$GITHUB_OUTPUT"
          echo "Merge-base: $base"

      - name: Run benchmarks on merge-base (establish baseline)
        run: |
          head_sha=$(git rev-parse HEAD)
          git checkout --detach ${{ steps.base.outputs.sha }}
          cargo bench --locked --bench benchmarks -- \
            --save-baseline pr_base --noise-threshold 0.10
          git checkout --detach "$head_sha"

      - name: Run baseline-compatible benchmarks on PR head and compare
        id: relative-compare
        continue-on-error: true
        env:
          PORTLENS_BENCH_COMPARE: 1
        run: |
          cargo bench --locked --bench benchmarks -- \
            --baseline pr_base --noise-threshold 0.10 \
            | tee bench_compare_output.txt

      - name: Run full benchmark suite on PR head
        id: full-bench
        continue-on-error: true
        run: |
          cargo bench --locked --bench benchmarks \
            | tee bench_output.txt

      - name: Check absolute performance budgets
        id: budget
        continue-on-error: true
        run: bash scripts/check-benchmark-budget.sh bench_output.txt

      - name: Flag regressions
        id: relative-regression
        continue-on-error: true
        run: |
          if [[ ! -f bench_compare_output.txt ]]; then
            echo "Relative comparison output is missing."
            exit 1
          fi

          if grep -E "Performance has regressed" bench_compare_output.txt; then
            grep -B1 "Performance has regressed" bench_compare_output.txt \
              | sed -n 's/.*/::warning::Bench regression: &/p'
            echo "One or more benchmarks regressed beyond the 10% noise threshold."
            exit 1
          fi
          echo "No benchmark regressions detected."

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: benchmark-reports-${{ github.sha }}
          path: |
            bench_compare_output.txt
            bench_output.txt
            target/criterion
          retention-days: 7
          if-no-files-found: warn

      - name: Fail benchmark checks
        if: always()
        run: |
          if [[ "${{ steps.relative-compare.outcome }}" == "failure" || "${{ steps.full-bench.outcome }}" == "failure" || "${{ steps.budget.outcome }}" == "failure" || "${{ steps.relative-regression.outcome }}" == "failure" ]]; then
            echo "One or more benchmark checks failed."
            exit 1
          fi
          echo "All benchmark checks passed."

  # Gate 7: Dependency audit — rejects vulnerable/banned/unlicensed dependencies.
  # Uses EmbarkStudios/cargo-deny-action (Docker-based, pre-built binary — no
  # manual install or caching needed).  Advisories are split into a separate
  # matrix entry with continue-on-error so a sudden new advisory announcement
  # does not block unrelated PRs.
  audit:
    name: Dependency Audit (${{ matrix.checks }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    # A new advisory should warn, not block unrelated work.
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Gate 7: cargo deny check ${{ matrix.checks }}"
        uses: EmbarkStudios/cargo-deny-action@82eb9f621fbc699dd0918f3ea06864c14cc84246 # v2
        with:
          command: check ${{ matrix.checks }}
